spring.application.name=hospedaje-rb

# ---------------- Oracle Database ----------------
# Ajusta host, puerto, servicio, usuario y password a tu Oracle local.
spring.datasource.url=jdbc:oracle:thin:@//localhost:1522/FREEPDB1
spring.datasource.username=DBhospedajeRBSyS
spring.datasource.password=123456
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# ---------------- JPA / Hibernate ----------------
# 'validate' = Hibernate solo verifica que las entidades calcen con tus tablas.
# Las tablas las creas ejecutando DB_HospedajeRB_snake_case.sql en SQL Developer.
# NUNCA uses create/update contra datos reales.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ---------------- Sesion (RN10 / inactividad) ----------------
# La sesion se cierra tras 15 min de inactividad. Idealmente este valor
# se lee de parametro_sistema; aqui queda el default de arranque.
server.servlet.session.timeout=15m

# ---------------- Seguridad: bloqueo por intentos (RN08 / RNF04) ----------------
# Limite de intentos fallidos antes de bloquear y minutos de bloqueo.
app.seguridad.max-intentos=3
app.seguridad.minutos-bloqueo=15

# ---------------- Recuperacion de contrasena (RF41-RF44) ----------------
# URL base usada para armar el enlace del correo de recuperacion.
app.base-url=http://localhost:8080
# Minutos de validez del token de recuperacion (RF42).
app.recuperacion.minutos-token=15
# Remitente que aparecera en el correo.
app.mail.from=no-responder@hospedajerb.pe

# ---------------- SMTP (CAMBIA estos valores por los de tu proveedor) ----------------
