<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar acceso · Hospedaje RB</title>
    <link rel="stylesheet" th:href="@{/css/tokens.css}">
    <link rel="stylesheet" th:href="@{/css/login.css}">
</head>
<body class="login-page">
<div class="login-panel" style="max-width:480px;grid-template-columns:1fr">
    <div class="login-card">
        <div class="login-card__header">RECUPERAR ACCESO</div>
        <h1>¿Olvidaste tu contrasena?</h1>
        <p class="login-card__sub">
            Ingresa tu correo y te enviaremos un enlace para restablecerla.
        </p>

        <div th:if="${enviado}" class="alert alert--info" style="margin-bottom:16px">
            Si el correo esta registrado, recibiras un enlace de recuperacion (valido 15 min).
        </div>

        <form th:action="@{/recuperar}" method="post">
            <div class="campo">
                <label class="campo__label" for="correo">Correo electronico</label>
                <div class="campo__input">
                    <input type="email" id="correo" name="correo" required placeholder="tucorreo@dominio.com">
                </div>
            </div>
            <button type="submit" class="btn btn--primario">Enviar enlace</button>
        </form>
        <hr class="login-card__divider">
        <p class="login-card__soporte"><a th:href="@{/login}">&#8592; Volver al inicio de sesion</a></p>
    </div>
</div>
</body>
</html>
