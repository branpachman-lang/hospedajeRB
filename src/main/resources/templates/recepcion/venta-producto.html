<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar Venta · Hospedaje RB</title>
    <meta name="_csrf" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:content="${_csrf.headerName}">
    <link rel="stylesheet" th:href="@{/css/tokens.css}">
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <link rel="stylesheet" th:href="@{/css/venta.css}">
</head>
<body>
<div class="app">
    <div th:replace="~{fragments/layout :: sidebar('venta')}"></div>
    <div class="main">
        <div th:replace="~{fragments/layout :: topbar('REGISTRAR VENTA DE PRODUCTO')}"></div>
        <div class="contenido">

            <div class="venta-grid">

                <!-- Catalogo -->
                <section class="card">
                    <div class="filtros-venta">
                        <div class="filtro">
                            <label>Categoría</label>
                            <select id="f-categoria">
                                <option value="">Todas</option>
                                <option th:each="c : ${categorias}" th:value="${c.idCategoria}" th:text="${c.nombreCategoria}"></option>
                            </select>
                        </div>
                        <div class="filtro filtro-crece">
                            <label>Buscar producto</label>
                            <input id="f-buscar" type="text" placeholder="Nombre del producto...">
                        </div>
                    </div>
                    <div id="productos" class="productos-grid"></div>
                    <p id="prod-vacio" class="vacio" style="display:none">No hay productos para ese filtro.</p>
                </section>

                <!-- Carrito -->
                <aside class="card carrito">
                    <h2 class="seccion">Carrito</h2>
                    <div id="cart-items"></div>
                    <p id="cart-vacio" class="vacio">Aún no agregas productos.</p>

                    <div class="totales">
                        <div><span>Subtotal</span><strong id="t-subtotal">S/ 0.00</strong></div>
                        <div><span>IGV (18%)</span><strong id="t-igv">S/ 0.00</strong></div>
                        <div class="total-final"><span>Total</span><strong id="t-total">S/ 0.00</strong></div>
                    </div>

                    <label class="check-habitacion">
                        <input type="checkbox" id="chk-habitacion"> Cargar a una habitación (reserva)
                    </label>

                    <div id="box-reserva" class="box-reserva" style="display:none">
                        <label>Buscar reserva (código, habitación o cliente)</label>
                        <input id="f-reserva" type="text" placeholder="Ej. 260628 / 101 / Pérez">
                        <div id="reserva-result" class="reserva-result"></div>
                        <div id="reserva-sel" class="reserva-sel" style="display:none"></div>
                    </div>

                    <div id="box-pago" class="box-pago">
                        <label>Forma de pago</label>
                        <select id="f-formapago"></select>
                        <label id="lbl-operacion" style="display:none">N° de operación</label>
                        <input id="f-operacion" type="text" placeholder="Código de operación" style="display:none">
                    </div>

                    <button type="button" id="btn-confirmar" class="btn-verde full">✔ Confirmar Venta</button>
                </aside>

            </div>
        </div>
    </div>
</div>

<!-- Modal comprobante -->
<div id="modal-comp" class="modal-bg" style="display:none">
    <div class="modal-card">
        <h2 class="seccion" style="text-align:center">Comprobante emitido</h2>
        <div id="comp-body"></div>
        <div style="text-align:center;margin-top:18px">
            <button type="button" id="comp-cerrar" class="btn-verde">Aceptar</button>
        </div>
    </div>
</div>

<script th:src="@{/js/venta-producto.js}"></script>
</body>
</html>
