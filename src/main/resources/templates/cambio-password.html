<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cambiar contrasena · Hospedaje RB</title>
    <link rel="stylesheet" th:href="@{/css/tokens.css}">
    <link rel="stylesheet" th:href="@{/css/login.css}">
</head>
<body class="login-page">
<div class="login-panel" style="max-width:480px;grid-template-columns:1fr">
    <div class="login-card">
        <div class="login-card__header">SEGURIDAD</div>
        <h1>Actualiza tu contrasena</h1>
        <p class="login-card__sub">
            Tu credencial es temporal. Define una contrasena personal y segura para continuar.
        </p>

        <div th:if="${error}" class="alert alert--error" style="margin-bottom:16px" th:text="${error}"></div>

        <form th:action="@{/cambio-password}" method="post">
            <div class="campo">
                <label class="campo__label" for="nueva">Nueva contrasena</label>
                <div class="campo__input">
                    <input type="password" id="nueva" name="nueva" required
                           placeholder="Min. 8, con letras y numeros">
                </div>
            </div>
            <div class="campo">
                <label class="campo__label" for="confirmacion">Confirmar contrasena</label>
                <div class="campo__input">
                    <input type="password" id="confirmacion" name="confirmacion" required>
                </div>
            </div>
            <button type="submit" class="btn btn--primario">Guardar y continuar</button>
        </form>
    </div>
</div>
</body>
</html>
